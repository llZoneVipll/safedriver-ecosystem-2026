version: '3.8'
services:
  # Servicio 1: El Servidor API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - smat_sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/safedriver.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Servicio 2: El traductor de protocolos IoT
  mqtt_bridge:
    build: ./iot_industrial
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:8000/alertas/
      # Pon aquí un token JWT válido generado en tu Swagger
      - JWT_TOKEN=tu_token_jwt_aqui 

volumes:
  # Define el volumen para que la DB sobreviva a reinicios
  smat_sqlite_data: